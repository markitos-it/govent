name: Go CI & Security Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-security:
    name: Run Tests and AppSec
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      # 3. Levantar el contenedor de Postgres
      - name: Start Postgres Database
        run: make db-start

      # 4. Esperar utilizando el Healthcheck nativo de tu docker-compose
      - name: Wait for Postgres to be healthy
        run: |
          echo "⏳ Esperando a que el contenedor reporte estado HEALTHY..."
          until [ "$(docker inspect --format='{{json .State.Health.Status}}' govent-postgres)" == "\"healthy\"" ]; do
            sleep 1
          done
          echo "✅ ¡Postgres está 100% operativo!"

      # 5. Limpieza previa y creación del esquema
      - name: Create Database and Schema
        env:
          PGHOST: 127.0.0.1
          PGUSER: admin
          PGPASSWORD: admin
        run: |
          # Forzamos el borrado de la BD automática para que 'make db-create' no choque al intentar crearla de nuevo
          docker exec -i govent-postgres psql -U admin -d postgres -c "DROP DATABASE IF EXISTS govent;"
          
          # Ahora sí, ejecutamos tu script original de creación
          make db-create

      # 6. Lanzar tests unitarios y de integración
      - name: Run Unit Tests
        run: make test

      # 7. Lanzar tests de seguridad (AppSec)
      - name: Run Application Security Tests
        run: make appsec-test
