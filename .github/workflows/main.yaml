name: Go CI & Security Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-security:
    name: Run Tests and AppSec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Start Postgres Database
        run: make db-start

      - name: Wait for Postgres to be healthy
        run: |
          echo "⏳ Esperando a que el contenedor reporte estado HEALTHY..."
          until [ "$(docker inspect --format='{{json .State.Health.Status}}' govent-postgres)" == "\"healthy\"" ]; do
            sleep 1
          done
          echo "✅ ¡Postgres está 100% operativo!"

      - name: Create Database
        id: db-create
        env:
          PGHOST: 127.0.0.1
          PGUSER: admin
          PGPASSWORD: admin
        run: |
          docker exec -i govent-postgres psql -U admin -d postgres -c "DROP DATABASE IF EXISTS govent;"
          make db-create

      - name: Start API Server & Wait for Port 30000
        id: api-start
        run: |
          make start &
          echo "⏳ Esperando de forma dinámica a que el API responda en el puerto 30000..."
          FORKS=0
          until nc -z 127.0.0.1 30000 || [ $FORKS -eq 15 ]; do
            sleep 0.5
            FORKS=$((FORKS + 1))
          done
          if nc -z 127.0.0.1 30000; then
            echo "✅ ¡El API ha levantado con éxito y las tablas están listas!"
          else
            echo "❌ ERROR: El API no logró iniciar en el puerto 30000 a tiempo."
            exit 1
          fi

      - name: Run Unit Tests
        id: unit-tests
        run: make test

      - name: Install Security & Linting Tools (Snyk, Gitleaks, GolangCI-Lint)
        id: tools-install
        run: |
          echo "📦 Instalando Snyk a través de NPM..."
          npm install -g snyk
          
          echo "📦 Instalando Gitleaks (Última versión)..."
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz
          sudo cp gitleaks /usr/local/bin/

          echo "📦 Instalando GolangCI-Lint (Última versión compatible con Go 1.26+)..."
          GOLANGCI_VERSION=$(curl -s https://api.github.com/repos/golangci/golangci-lint/releases/latest | grep tag_name | cut -d '"' -f 4 | sed 's/v//')
          curl -sSfL "https://github.com/golangci/golangci-lint/releases/download/v${GOLANGCI_VERSION}/golangci-lint-${GOLANGCI_VERSION}-linux-amd64.tar.gz" | tar -xz
          sudo cp "golangci-lint-${GOLANGCI_VERSION}-linux-amd64/golangci-lint" /usr/local/bin/
          
          echo "🧹 Limpiando archivos temporales..."
          rm -rf gitleaks golangci-lint-${GOLANGCI_VERSION}-linux-amd64
          rm -rf LICENSE README.md

      # 9. Lanzar suite de seguridad nativa
      - name: Run Application Security Tests
        id: appsec
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: make appsec-test

      # 10. Generar el reporte visual en la interfaz de GitHub
      - name: Generate Beautiful Job Summary
        if: always()
        run: |
          status_to_emoji() {
            if [ "$1" == "success" ]; then
              echo "✅"
            elif [ "$1" == "failure" ]; then
              echo "❌"
            elif [ "$1" == "cancelled" ]; then
              echo "🛑"
            else
              echo "⏭️"
            fi
          }
          
          echo "## 🚀 GoVent DevSecOps - Reporte de Ejecución" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Resumen de la Infraestructura de CI" >> $GITHUB_STEP_SUMMARY
          echo "| Componente | Configuración / Tarea | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| 🦫 **Entorno Core** | Go v1.26.4 (Caché Activa) | $(status_to_emoji '${{ steps.setup-go.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐘 **Base de Datos** | Postgres 17 (Docker Alpine) | $(status_to_emoji '${{ steps.db-healthy.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🗄️ **Base de Datos** | Creación DB govent | $(status_to_emoji '${{ steps.db-create.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ **ORM Migrations** | Puerto :30000 validado dinámicamente | $(status_to_emoji '${{ steps.api-start.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests Unitarios** | Cobertura y test suite | $(status_to_emoji '${{ steps.unit-tests.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛠️ **Herramientas CI** | Setup de Snyk, Gitleaks, y GolangCI | $(status_to_emoji '${{ steps.tools-install.outcome }}') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ **AppSec Suite** | Análisis de vulnerabilidades superado | $(status_to_emoji '${{ steps.appsec.outcome }}') |" >> $GITHUB_STEP_SUMMARY