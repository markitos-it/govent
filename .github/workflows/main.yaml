name: Go CI & Security Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-security:
    name: Run Tests and AppSec
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      # 3. Levantar el contenedor de Postgres
      - name: Start Postgres Database
        run: make db-start

      # 4. Esperar al Healthcheck de Postgres
      - name: Wait for Postgres to be healthy
        run: |
          echo "⏳ Esperando a que el contenedor reporte estado HEALTHY..."
          until [ "$(docker inspect --format='{{json .State.Health.Status}}' govent-postgres)" == "\"healthy\"" ]; do
            sleep 1
          done
          echo "✅ ¡Postgres está 100% operativo!"

      # 5. Limpieza previa y creación de la base de datos
      - name: Create Database
        env:
          PGHOST: 127.0.0.1
          PGUSER: admin
          PGPASSWORD: admin
        run: |
          docker exec -i govent-postgres psql -U admin -d postgres -c "DROP DATABASE IF EXISTS govent;"
          make db-create

      # 6. Arrancar el API en segundo plano (Auto-Migrations)
      - name: Start API Server in Background
        run: |
          make start &
          echo "⏳ Esperando 5 segundos a que el API inicialice y aplique el esquema..."
          sleep 30

      # 7. Lanzar tests unitarios y de integración
      - name: Run Unit Tests
        run: make test

      # 8. Instalar Snyk CLI
      - name: Install Snyk CLI
        run: npm install -g snyk

      # 9. ◄— PASO BLINDADO: Detecta si falta el token para evitar el cuelgue eterna
      - name: Run Application Security Tests
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "========================================================================="
            echo "❌ ERROR CRÍTICO: El secreto 'SNYK_TOKEN' no está configurado en GitHub."
            echo "Asegúrate de crearlo en Settings -> Secrets and variables -> Actions."
            echo "========================================================================="
            exit 1
          fi
          make appsec-test

      # 10. Generar el reporte visual en la interfaz de GitHub (Se ejecutará siempre)
      - name: Generate Beautiful Job Summary
        if: always()
        run: |
          echo "## 🚀 GoVent DevSecOps - Reporte de Ejecución" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Resumen de la Infraestructura de CI" >> $GITHUB_STEP_SUMMARY
          echo "| Componente | Configuración / Estado |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🦫 **Entorno Core** | Go v1.26.4 (Caché Activa) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐘 **Base de Datos** | Postgres 17 (Docker Alpine) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛠️ **Esquema SQL** | Creado desde cero con éxito |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ **ORM Migrations** | Aplicadas (API arrancada en Background) |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ **AppSec Scan** | Revisar estado en los pasos del Job |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "### 🛠️ Información de la Ejecución" >> $GITHUB_STEP_SUMMARY
          echo "* **Rama:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Disparado por:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
