name: Go CI & Security Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-security:
    name: Run Tests and AppSec
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio en el runner de GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Go con la versión exacta
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true # Acelera las ejecuciones guardando las librerías

      # 3. Levantar el contenedor de Postgres
      - name: Start Postgres Database
        run: make db-start

      # 4. Esperar a que Postgres esté listo para recibir conexiones internamente
      - name: Wait for Postgres to be ready
        run: |
          echo "⏳ Esperando a que Postgres inicialice..."
          until docker exec govent-postgres pg_isready -U govent; do
            sleep 1
          done
          echo "✅ ¡Postgres está listo!"

      # 5. Crear la Base de Datos ejecutando el script DENTRO del contenedor (Opción A)
      - name: Create Database and Schema
        run: |
          docker exec -i govent-postgres bash < bin/database/create.sh

      # 6. Lanzar tus tests unitarios y de integración
      - name: Run Unit Tests
        run: make test

      # 7. Lanzar tests de seguridad (AppSec)
      - name: Run Application Security Tests
        run: make appsec-test
