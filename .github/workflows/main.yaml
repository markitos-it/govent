name: Go CI & Security Checks

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-and-security:
    name: Run Tests and AppSec
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio en el runner de GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Go con la versión exacta
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true # Activa la caché de dependencias para acelerar las ejecuciones

      # 3. Levantar y preparar la Base de Datos Postgres
      - name: Start Postgres Database
        run: make db-start

      - name: Create Database and Schema
        run: make db-create

      # 4. Lanzar tus tests unitarios / de integración (ya con la BD lista)
      - name: Run Unit Tests
        run: make test

      # 5. Lanzar tus tests de seguridad (SAST, dependencias, etc.)
      - name: Run Application Security Tests
        run: make appsec-test
