syntax = "proto3";

package event;

import "google/protobuf/timestamp.proto";

option go_package = "markitos-it-svc-event-grpc/gapi";

message Event {
  string id = 1;
  string slug = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  string source = 5;
  string payload = 6;
}

message QueueMessage {
  string id = 1;
  string subscriber_name = 2;
  string event_id = 3;
  string status = 4;
  string payload = 5;
}

service Eventservice {
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
  rpc AllBySlugAndSource(AllEventsBySlugAndSourceRequest) returns (AllEventsBySlugAndSourceResponse);
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  rpc PullMessages(PullMessagesRequest) returns (PullMessagesResponse);
  rpc AckMessage(AckMessageRequest) returns (AckMessageResponse);
}

message CreateEventRequest {
  string slug = 1;
  string source = 3;
  string payload = 4;
}

message CreateEventResponse {
  string id = 1;
  string slug = 2;
  string source = 3;
  string payload = 4;
}

message GetEventRequest {
  string id = 1;
}

message GetEventResponse {
  string id = 1;
  string slug = 2;
  string source = 3;
  string payload = 4;
}


message DeleteEventRequest {
  string id = 1;
}

message DeleteEventResponse {
  string deleted = 1;
}

message AllEventsBySlugRequest {
  string slug = 1;
}

message AllEventsBySlugResponse {
  repeated Event events = 1;
}

message AllEventsBySlugAndSourceRequest {
  string slug = 1;
  string source = 2;
}

message AllEventsBySlugAndSourceResponse {
  repeated Event events = 1;
}

message CreateSubscriptionRequest {
  string subscriber_name = 1;
  string event_name = 2;
  string source = 3;
}

message CreateSubscriptionResponse {
  bool success = 1;
  string message = 2;
}

message PullMessagesRequest {
  string event_name = 1;
  string source = 2;
}

message PullMessagesResponse {
  repeated QueueMessage messages = 1;
}

message AckMessageRequest {
  string queue_id = 1;
}

message AckMessageResponse {
  bool success = 1;
}