syntax = "proto3";

package event;

import "google/protobuf/timestamp.proto";

option go_package = "markitos-it-svc-event-grpc/gapi";

message Event {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp updated_at = 4;
  string source = 5;
  string payload = 6;
}

service Eventservice {
  rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse);
  rpc GetEvent(GetEventRequest) returns (GetEventResponse);
  rpc DeleteEvent(DeleteEventRequest) returns (DeleteEventResponse);
  rpc AllByNameAndSource(AllEventsByNameAndSourceRequest) returns (AllEventsByNameAndSourceResponse);
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
}

message CreateEventRequest {
  string name = 1;
  string source = 3;
  string payload = 4;
}

message CreateEventResponse {
  string id = 1;
  string name = 2;
  string source = 3;
  string payload = 4;
}

message GetEventRequest {
  string id = 1;
}

message GetEventResponse {
  string id = 1;
  string name = 2;
  string source = 3;
  string payload = 4;
}


message DeleteEventRequest {
  string id = 1;
}

message DeleteEventResponse {
  string deleted = 1;
}

message AllEventsByNameAndSourceRequest {
  string name = 1;
  string source = 2;
}

message AllEventsByNameAndSourceResponse {
  repeated Event events = 1;
}

message CreateSubscriptionRequest {
  string subscriber_name = 1;
  string event_name = 2;
  string source = 3;
}

message CreateSubscriptionResponse {
  bool success = 1;
  string message = 2;
}